# ============================================================
# GitHub Actions — pre-push-review CI 模板
# ============================================================
# 用法: 在你的 workflow 中复制以下内容，或使用 reusable workflow:
#
#   jobs:
#     review:
#       uses: your-org/pre-push-review/.github/workflows/review.yml@main
#
# ============================================================

name: Pre-Push Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master, develop]

jobs:
  security-scan:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect hardcoded secrets
        run: |
          echo "=== Scanning for hardcoded secrets ==="
          SECRET_PATTERNS=(
            'AKIA[0-9A-Z]{16}'
            'sk_live_[0-9a-zA-Z]{24,}'
            'ghp_[0-9a-zA-Z]{36}'
            'gho_[0-9a-zA-Z]{36}'
            'xox[baprs]-[0-9a-zA-Z-]{10,}'
            'AIza[0-9A-Za-z\-_]{35}'
          )
          FAILED=0
          for pattern in "${SECRET_PATTERNS[@]}"; do
            MATCHES=$(git diff origin/${{ github.base_ref }}..HEAD | grep -oE "$pattern" | sort -u || true)
            if [[ -n "$MATCHES" ]]; then
              echo "::error::Detected secret pattern: $pattern"
              echo "$MATCHES" | while read line; do echo "  $line"; done
              FAILED=1
            fi
          done
          exit $FAILED

      - name: Detect .env file exposure
        run: |
          ENV_FILES=$(git diff --name-only origin/${{ github.base_ref }}..HEAD | grep -E '(\.env$|\.env\.local$|\.env\.production$)' || true)
          if [[ -n "$ENV_FILES" ]]; then
            echo "::error::.env file in diff — possible credential leak"
            echo "$ENV_FILES"
            exit 1
          fi

  privacy-scan:
    name: 🛡️ Privacy Scan (PII)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for PII
        run: |
          echo "=== Scanning for PII ==="
          DIFF=$(git diff origin/${{ github.base_ref }}..HEAD)

          # 手机号
          PHONES=$(echo "$DIFF" | grep -oE '1[3-9][0-9]{9}' | sort -u || true)
          if [[ -n "$PHONES" ]]; then
            echo "::error::Found phone numbers in diff"
            echo "$PHONES" | head -5
            exit 1
          fi

          # 身份证号
          IDS=$(echo "$DIFF" | grep -oE '[1-9][0-9]{5}(19|20)[0-9]{2}(0[1-9]|1[0-2])(0[1-9]|[12][0-9]|3[01])[0-9]{3}[0-9Xx]' | sort -u || true)
          if [[ -n "$IDS" ]]; then
            echo "::error::Found ID card numbers in diff"
            echo "$IDS" | head -5
            exit 1
          fi

          echo "::notice::PII scan passed"

  log-leak-check:
    name: 📋 Log Leak Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for sensitive data in logs
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}..HEAD)
          LEAKS=$(echo "$DIFF" | grep -E '(console\.(log|error|warn|debug|info)|println!|log\.|logger\.|logging\.)' | grep -iE '(password|secret|token|key|credential|pii|ssn|credit|card)' || true)
          if [[ -n "$LEAKS" ]]; then
            echo "::error::Potential sensitive data in log statements"
            echo "$LEAKS"
            exit 1
          fi
          echo "::notice::Log leak check passed"

  conclusion:
    name: 📊 Review Conclusion
    needs: [security-scan, privacy-scan, log-leak-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Report
        run: |
          if [[ "${{ needs.security-scan.result }}" != "success" ]] || \
             [[ "${{ needs.privacy-scan.result }}" != "success" ]] || \
             [[ "${{ needs.log-leak-check.result }}" != "success" ]]; then
            echo "🛑 BLOCKED — Pre-push review failed"
            exit 1
          fi
          echo "✅ CLEAR — All checks passed"
